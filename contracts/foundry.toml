[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
# EVM target (Base / Sepolia, both Cancun-enabled). The vendored Morpho engine's
# pragma was relaxed 0.8.19 -> ^0.8.19, so the whole project now compiles at the
# latest solc; OZ's ERC4626 deps (Memory.sol) use the `mcopy` Cancun opcode, so
# we target cancun. (The TRON sibling lend-solvent stays on paris because TVM
# lacks these opcodes — that's the TVM-vs-EVM divergence, not a lien constraint.)
evm_version = "cancun"

[fmt]
line_length = 120
tab_width = 4

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC}"
sepolia = "${SEPOLIA_RPC}"

[etherscan]
base_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532 }
