[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
# EVM target (Base / Sepolia). Common denominator: the vendored Morpho engine is
# pinned to solc 0.8.19 (whose max target is paris); new RWA contracts use
# ^0.8.20 and Foundry multi-compiles by pragma. paris bytecode runs on every EVM
# chain. (The TRON sibling lend-solvent also pinned paris, but for a different
# reason — TVM lacks PUSH0; here it's purely the 0.8.19 engine. Can move to
# cancun once the engine constraint is lifted.)
evm_version = "paris"

[fmt]
line_length = 120
tab_width = 4

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC}"
sepolia = "${SEPOLIA_RPC}"

[etherscan]
base_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532 }
